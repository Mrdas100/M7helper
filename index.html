<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مركز مساعدة M7TV</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23F5C200'/><text x='50' y='68' font-size='48' font-weight='900' text-anchor='middle' fill='%23000'>M7</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #0a0e1a;
  --bg-secondary: #111827;
  --bg-card: #1a2035;
  --bg-card-hover: #1f2847;
  --bg-glass: rgba(26,32,53,0.85);
  --accent: #F5C200;
  --accent-glow: rgba(245,194,0,0.25);
  --accent2: #00B4D8;
  --accent3: #3DDC84;
  --text-primary: #f0f0f0;
  --text-secondary: #8b95b0;
  --text-muted: #5a6380;
  --border: rgba(255,255,255,0.06);
  --border-accent: rgba(245,194,0,0.2);
  --danger: #ef4444;
  --success: #22c55e;
  --radius: 16px;
  --radius-sm: 10px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Tajawal',sans-serif;
  background:var(--bg-primary);
  color:var(--text-primary);
  direction:rtl;
  min-height:100vh;
  overflow-x:hidden;
}
.app-wrapper{
  min-height:100vh;
  position:relative;
  background:
    radial-gradient(ellipse 80% 50% at 50% -20%,rgba(245,194,0,0.06),transparent),
    radial-gradient(ellipse 60% 40% at 80% 80%,rgba(0,180,216,0.04),transparent),
    var(--bg-primary);
}
.orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;opacity:0.4;animation:orbFloat 20s ease-in-out infinite;}
.orb-1{width:300px;height:300px;background:rgba(245,194,0,0.12);top:-80px;right:-60px;}
.orb-2{width:250px;height:250px;background:rgba(0,180,216,0.1);bottom:10%;left:-80px;animation-delay:-7s;}
.orb-3{width:200px;height:200px;background:rgba(61,220,132,0.08);top:50%;right:30%;animation-delay:-14s;}
@keyframes orbFloat{
  0%,100%{transform:translate(0,0) scale(1);}
  33%{transform:translate(30px,-20px) scale(1.1);}
  66%{transform:translate(-20px,30px) scale(0.9);}
}
.header{
  position:sticky;top:0;z-index:100;
  backdrop-filter:blur(20px) saturate(1.5);
  background:rgba(10,14,26,0.8);
  border-bottom:1px solid var(--border);
  padding:0 24px;height:64px;
  display:flex;align-items:center;justify-content:space-between;
}
.logo{display:flex;align-items:center;gap:12px;font-weight:800;font-size:1.3rem;cursor:pointer;}
.logo-icon{
  width:40px;height:40px;
  background:linear-gradient(135deg,var(--accent),#e6a800);
  border-radius:12px;display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;color:#000;font-weight:900;
  box-shadow:0 4px 20px var(--accent-glow);
}
.logo span{color:var(--accent);}
.header-actions{display:flex;align-items:center;gap:8px;}

.btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 20px;border-radius:var(--radius-sm);border:none;
  cursor:pointer;font-family:inherit;font-weight:600;font-size:0.9rem;
  transition:all 0.2s;text-decoration:none;
}
.btn-primary{
  background:linear-gradient(135deg,var(--accent),#e6a800);
  color:#000;box-shadow:0 4px 20px var(--accent-glow);
}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 28px var(--accent-glow);}
.btn-ghost{background:transparent;color:var(--text-secondary);border:1px solid var(--border);}
.btn-ghost:hover{background:rgba(255,255,255,0.05);color:var(--text-primary);}
.btn-danger{background:rgba(239,68,68,0.15);color:var(--danger);border:1px solid rgba(239,68,68,0.2);}
.btn-danger:hover{background:rgba(239,68,68,0.25);}
.btn-sm{padding:6px 14px;font-size:0.82rem;border-radius:8px;}
.btn-icon{padding:8px;border-radius:10px;}

.hero{text-align:center;padding:60px 24px 40px;position:relative;z-index:1;}
.hero h1{
  font-size:clamp(1.8rem,5vw,3rem);font-weight:900;line-height:1.3;margin-bottom:12px;
  background:linear-gradient(135deg,var(--text-primary),var(--accent));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.hero p{color:var(--text-secondary);font-size:1.1rem;max-width:500px;margin:0 auto 32px;}

.search-box{max-width:560px;margin:0 auto;position:relative;}
.search-box input{
  width:100%;padding:16px 24px 16px 50px;border-radius:50px;
  border:1px solid var(--border-accent);background:var(--bg-card);
  color:var(--text-primary);font-family:inherit;font-size:1rem;outline:none;transition:all 0.3s;
}
.search-box input::placeholder{color:var(--text-muted);}
.search-box input:focus{border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-glow);}
.search-icon{position:absolute;left:18px;top:50%;transform:translateY(-50%);color:var(--text-muted);display:flex;}

.categories-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:16px;max-width:1000px;margin:0 auto;padding:0 24px 40px;position:relative;z-index:1;
}
.cat-card{
  background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);
  padding:28px 24px;cursor:pointer;transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
  display:flex;flex-direction:column;gap:12px;position:relative;overflow:hidden;
}
.cat-card::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at top right,var(--cat-color-a),transparent 70%);
  opacity:0;transition:opacity 0.3s;
}
.cat-card:hover::before{opacity:1;}
.cat-card:hover{transform:translateY(-4px);border-color:var(--cat-color);box-shadow:0 12px 40px rgba(0,0,0,0.4);}
.cat-icon{
  width:52px;height:52px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;position:relative;z-index:1;
}
.cat-card h3{font-size:1.1rem;font-weight:700;position:relative;z-index:1;}
.cat-card p{color:var(--text-secondary);font-size:0.88rem;position:relative;z-index:1;}
.cat-count{
  display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;
  font-size:0.75rem;font-weight:600;width:fit-content;position:relative;z-index:1;
}

.content-area{max-width:1000px;margin:0 auto;padding:0 24px 60px;position:relative;z-index:1;}
.section-header{display:flex;align-items:center;gap:12px;margin-bottom:24px;flex-wrap:wrap;}
.section-header h2{font-size:1.5rem;font-weight:800;}

.breadcrumb{display:flex;align-items:center;gap:8px;color:var(--text-secondary);font-size:0.88rem;margin-bottom:24px;flex-wrap:wrap;}
.breadcrumb button{background:none;border:none;color:var(--accent);cursor:pointer;font-family:inherit;font-size:inherit;font-weight:600;}
.breadcrumb button:hover{text-decoration:underline;}

.article-list{display:flex;flex-direction:column;gap:12px;}
.article-card{
  background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);
  padding:20px 24px;cursor:pointer;transition:all 0.25s;display:flex;align-items:center;gap:16px;
}
.article-card:hover{background:var(--bg-card-hover);border-color:rgba(255,255,255,0.1);transform:translateX(-4px);}

.article-type-badge{padding:4px 12px;border-radius:20px;font-size:0.72rem;font-weight:700;white-space:nowrap;flex-shrink:0;}
.article-card h4{font-size:1rem;font-weight:600;flex:1;}

.type-activation{background:rgba(61,220,132,0.12);color:#3DDC84;}
.type-renewal{background:rgba(0,180,216,0.12);color:#00B4D8;}
.type-troubleshoot{background:rgba(239,68,68,0.12);color:#ef4444;}
.type-download{background:rgba(245,194,0,0.12);color:#F5C200;}
.type-general{background:rgba(139,149,176,0.12);color:#8b95b0;}

.article-detail{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:32px;}
.article-detail h2{font-size:1.5rem;font-weight:800;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border);}

.step-list{display:flex;flex-direction:column;gap:16px;}
.step-item{display:flex;gap:16px;align-items:flex-start;}
.step-num{
  width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),#e6a800);color:#000;
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:0.9rem;flex-shrink:0;
}
.step-text{padding-top:6px;font-size:1rem;line-height:1.7;color:var(--text-primary);}

.article-actions{display:flex;gap:12px;margin-top:28px;flex-wrap:wrap;}

.feedback-box{margin-top:32px;padding-top:24px;border-top:1px solid var(--border);text-align:center;}
.feedback-box p{color:var(--text-secondary);margin-bottom:12px;font-weight:600;}
.feedback-btns{display:flex;gap:12px;justify-content:center;}
.fb-btn{
  display:flex;align-items:center;gap:6px;padding:10px 24px;border-radius:50px;
  border:1px solid var(--border);background:transparent;color:var(--text-secondary);
  cursor:pointer;font-family:inherit;font-weight:600;transition:all 0.2s;font-size:0.92rem;
}
.fb-btn:hover{background:rgba(255,255,255,0.05);}
.fb-btn.voted-yes{background:rgba(34,197,94,0.15);color:var(--success);border-color:rgba(34,197,94,0.3);}
.fb-btn.voted-no{background:rgba(239,68,68,0.15);color:var(--danger);border-color:rgba(239,68,68,0.3);}

.status-grid{display:flex;flex-direction:column;gap:12px;margin-top:20px;}
.status-card{
  background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:18px 24px;display:flex;align-items:center;justify-content:space-between;
}
.status-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
.status-online{background:var(--success);box-shadow:0 0 12px rgba(34,197,94,0.5);}
.status-offline{background:var(--danger);box-shadow:0 0 12px rgba(239,68,68,0.5);}
.status-maintenance{background:var(--accent);box-shadow:0 0 12px var(--accent-glow);}
.status-info{display:flex;align-items:center;gap:12px;}
.status-label{font-weight:600;}
.status-time{color:var(--text-muted);font-size:0.8rem;}

.status-pills{display:flex;gap:12px;flex-wrap:wrap;}
.status-pill{
  display:flex;align-items:center;gap:10px;padding:10px 20px;
  background:var(--bg-card);border:1px solid var(--border);border-radius:50px;
}
.status-pill .name{font-weight:600;font-size:0.9rem;}
.status-pill .state{color:var(--text-muted);font-size:0.78rem;}

.admin-container{max-width:1000px;margin:0 auto;padding:24px;position:relative;z-index:1;}
.admin-tabs{display:flex;gap:4px;margin-bottom:24px;background:var(--bg-secondary);border-radius:var(--radius-sm);padding:4px;overflow-x:auto;}
.admin-tab{
  padding:10px 20px;border-radius:8px;border:none;background:transparent;
  color:var(--text-secondary);cursor:pointer;font-family:inherit;font-weight:600;
  font-size:0.88rem;white-space:nowrap;transition:all 0.2s;
}
.admin-tab.active{background:var(--bg-card);color:var(--text-primary);}
.admin-tab:hover{color:var(--text-primary);}

.form-group{margin-bottom:20px;}
.form-group label{display:block;margin-bottom:8px;font-weight:600;font-size:0.9rem;color:var(--text-secondary);}
.form-group input,.form-group textarea,.form-group select{
  width:100%;padding:12px 16px;border-radius:var(--radius-sm);
  border:1px solid var(--border);background:var(--bg-secondary);
  color:var(--text-primary);font-family:inherit;font-size:0.95rem;outline:none;transition:border-color 0.2s;
}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:var(--accent);}
.form-group textarea{min-height:160px;resize:vertical;line-height:1.7;}
.form-group select{cursor:pointer;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}

.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;}
.toggle{width:48px;height:26px;border-radius:13px;border:none;cursor:pointer;position:relative;transition:background 0.2s;}
.toggle.on{background:var(--success);}
.toggle.off{background:var(--text-muted);}
.toggle::after{content:'';position:absolute;width:20px;height:20px;border-radius:50%;background:white;top:3px;transition:all 0.2s;}
.toggle.on::after{left:3px;right:auto;}
.toggle.off::after{right:3px;left:auto;}

.admin-table{width:100%;border-collapse:separate;border-spacing:0;}
.admin-table th{
  padding:12px 16px;text-align:right;font-weight:600;font-size:0.82rem;
  color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--border);
}
.admin-table td{padding:14px 16px;border-bottom:1px solid var(--border);font-size:0.92rem;}
.admin-table tr:hover td{background:rgba(255,255,255,0.02);}
.actions{display:flex;gap:6px;}

.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;z-index:200;padding:24px;
}
.modal{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:40px;max-width:400px;width:100%;text-align:center;}
.modal h3{font-size:1.3rem;margin-bottom:8px;}
.modal p{color:var(--text-secondary);margin-bottom:24px;font-size:0.92rem;}
.pin-input{letter-spacing:16px;text-align:center;font-size:1.8rem;font-weight:700;padding:14px !important;}
.pin-error{color:var(--danger);font-size:0.85rem;margin-top:8px;}

.whatsapp-fab{
  position:fixed;bottom:24px;left:24px;width:56px;height:56px;border-radius:50%;
  background:#25D366;color:white;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(37,211,102,0.4);z-index:100;transition:all 0.3s;
  animation:fabPulse 3s ease-in-out infinite;text-decoration:none;
}
.whatsapp-fab:hover{transform:scale(1.1);}
@keyframes fabPulse{
  0%,100%{box-shadow:0 4px 20px rgba(37,211,102,0.4);}
  50%{box-shadow:0 4px 30px rgba(37,211,102,0.6);}
}

.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px;}
.stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;text-align:center;}
.stat-value{
  font-size:2rem;font-weight:900;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.stat-label{color:var(--text-secondary);font-size:0.85rem;margin-top:4px;}

.footer{text-align:center;padding:32px 24px;color:var(--text-muted);font-size:0.82rem;border-top:1px solid var(--border);position:relative;z-index:1;}

.empty-state{text-align:center;padding:60px 24px;color:var(--text-muted);}
.empty-state p{font-size:1rem;}

.hidden{display:none !important;}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.fade-up{animation:fadeUp 0.5s ease-out forwards;}
.delay-1{animation-delay:0.1s;opacity:0;}
.delay-2{animation-delay:0.2s;opacity:0;}
.delay-3{animation-delay:0.3s;opacity:0;}
.delay-4{animation-delay:0.4s;opacity:0;}

@media(max-width:640px){
  .categories-grid{grid-template-columns:1fr;}
  .header{padding:0 16px;}
  .hero{padding:40px 16px 28px;}
  .content-area,.admin-container{padding:0 16px 40px;}
  .article-detail{padding:24px 18px;}
  .form-row{grid-template-columns:1fr;}
  .modal{padding:28px 20px;}
  .status-pills{flex-direction:column;}
}
</style>
</head>
<body>
<div class="app-wrapper" id="app">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <footer class="footer">

<script>
// ─── Firebase Config ───
const DB = "https://m7tv-helpcenter-default-rtdb.europe-west1.firebasedatabase.app";

async function fbGet(path) {
  try { const r = await fetch(`${DB}/${path}.json`); return await r.json(); } catch { return null; }
}
async function fbSet(path, data) {
  await fetch(`${DB}/${path}.json`, { method: "PUT", body: JSON.stringify(data) });
}
async function fbPush(path, data) {
  const r = await fetch(`${DB}/${path}.json`, { method: "POST", body: JSON.stringify(data) });
  return await r.json();
}
async function fbDelete(path) {
  await fetch(`${DB}/${path}.json`, { method: "DELETE" });
}

// ─── State ───
let state = {
  view: "home",
  selectedCat: null,
  selectedArticle: null,
  articles: {},
  servers: {},
  search: "",
  isAdmin: false,
  feedback: {},
  adminTab: "articles",
  editingArticle: null,
  editingServer: null,
};

// ─── Helpers ───
function getCatLabel(id) { return CATEGORIES.find(c => c.id === id)?.label || ""; }
function getTypeLabel(id) { return ARTICLE_TYPES.find(t => t.id === id)?.label || ""; }
function getCatCount(catId) { return Object.values(state.articles).filter(a => a.published && a.category === catId).length; }

function parseSteps(text) {
  if (!text) return [];
  return text.split("\n").filter(l => l.trim()).map(l => l.replace(/^\d+[\.\-\)]\s*/, "").trim());
}

function getEmbedUrl(url) {
  if (!url) return null;
  const m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\s]+)/);
  return m ? `https://www.youtube.com/embed/${m[1]}` : null;
}

function getPublished() { return Object.entries(state.articles).filter(([,a]) => a.published); }

function getFiltered() {
  return getPublished().filter(([,a]) => {
    const mc = state.selectedCat ? a.category === state.selectedCat : true;
    const ms = state.search ? (a.title.includes(state.search) || a.steps?.includes(state.search)) : true;
    return mc && ms;
  }).sort(([,a],[,b]) => (a.order||0) - (b.order||0));
}

// ─── Navigation ───
function navigate(view, cat, article) {
  state.view = view;
  state.selectedCat = cat || null;
  state.selectedArticle = article || null;
  state.search = "";
  state.editingArticle = null;
  state.editingServer = null;
  render();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

// ─── Render ───
function render() {
  const views = ["home","category","article","status","admin"];
  views.forEach(v => {
    const el = document.getElementById(`view-${v}`);
    if (el) el.classList.toggle("hidden", state.view !== v);
  });

  if (state.view === "home") renderHome();
  else if (state.view === "category") renderCategory();
  else if (state.view === "article") renderArticle();
  else if (state.view === "status") renderStatus();
  else if (state.view === "admin") renderAdmin();
}

function renderHome() {
  const el = document.getElementById("view-home");
  const filtered = getFiltered();
  const showSearch = state.search && state.search.length > 0;

  let html = `
    <section class="hero fade-up">
      <h1>مركز مساعدة M7TV</h1>
      <p>كل ما تحتاجه لتفعيل وإعداد اشتراكك في مكان واحد</p>
      <div class="search-box">
        <span class="search-icon">${ICONS.search}</span>
        <input id="search-input" placeholder="ابحث عن جهازك أو مشكلتك..." value="${state.search}" oninput="handleSearch(this.value)" onkeydown="if(event.key==='Enter'&&this.value)navigate('category')">
      </div>
    </section>`;

  if (showSearch) {
    html += `<div class="content-area"><div class="section-header"><h2>نتائج البحث</h2><span style="color:var(--text-muted);font-size:0.88rem">(${filtered.length} نتيجة)</span></div><div class="article-list">`;
    if (filtered.length === 0) {
      html += `<div class="empty-state"><p>لم نجد نتائج، جرّب كلمات أخرى أو تواصل معنا</p></div>`;
    } else {
      filtered.forEach(([id, art]) => {
        html += `<div class="article-card" onclick="navigate('article','${art.category}',${JSON.stringify({...art,_id:id}).replace(/"/g,'&quot;')})">
          <span class="article-type-badge type-${art.type}">${getTypeLabel(art.type)}</span>
          <h4>${art.title}</h4>
        </div>`;
      });
    }
    html += `</div></div>`;
  } else {
    html += `<section class="categories-grid">`;
    CATEGORIES.forEach((cat, i) => {
      html += `<div class="cat-card fade-up delay-${i+1}" style="--cat-color:${cat.color};--cat-color-a:${cat.color}15" onclick="navigate('category','${cat.id}')">
        <div class="cat-icon" style="background:${cat.color}18;color:${cat.color}">${ICONS[cat.icon]}</div>
        <h3>${cat.label}</h3>
        <p>${cat.desc}</p>
        <div class="cat-count" style="background:${cat.color}12;color:${cat.color}">${getCatCount(cat.id)} شرح متوفر</div>
      </div>`;
    });
    html += `</section>`;

    // Server status pills
    html += `<div class="content-area" style="margin-top:20px"><div class="section-header"><h2 style="font-size:1.2rem">حالة السيرفرات</h2></div><div class="status-pills">`;
    Object.entries(state.servers).forEach(([id, s]) => {
      const stLabel = s.status === "online" ? "يعمل" : s.status === "offline" ? "متوقف" : "صيانة";
      html += `<div class="status-pill"><div class="status-dot status-${s.status}"></div><span class="name">${s.name}</span><span class="state">${stLabel}</span></div>`;
    });
    html += `</div></div>`;
  }

  el.innerHTML = html;
}

function handleSearch(val) {
  state.search = val;
  renderHome();
  const inp = document.getElementById("search-input");
  if (inp) { inp.focus(); inp.selectionStart = inp.selectionEnd = val.length; }
}

function renderCategory() {
  const el = document.getElementById("view-category");
  const filtered = getFiltered();
  let html = `<div class="content-area" style="padding-top:32px">
    <div class="breadcrumb">
      <button onclick="navigate('home')">${ICONS.home} الرئيسية</button><span>/</span>
      <span>${getCatLabel(state.selectedCat)}</span>
    </div>
    <div class="section-header"><h2>${getCatLabel(state.selectedCat)}</h2></div>
    <div class="article-list">`;
  if (filtered.length === 0) {
    html += `<div class="empty-state"><p>لا توجد شروحات في هذا القسم بعد</p></div>`;
  } else {
    filtered.forEach(([id, art]) => {
      html += `<div class="article-card fade-up" onclick='openArticle("${id}")'>
        <span class="article-type-badge type-${art.type}">${getTypeLabel(art.type)}</span>
        <h4>${art.title}</h4>
      </div>`;
    });
  }
  html += `</div></div>`;
  el.innerHTML = html;
}

function openArticle(id) {
  const art = state.articles[id];
  if (art) navigate("article", art.category, { ...art, _id: id });
}

function renderArticle() {
  const el = document.getElementById("view-article");
  const art = state.selectedArticle;
  if (!art) return;

  const steps = parseSteps(art.steps);
  const embedUrl = getEmbedUrl(art.videoUrl);
  const fb = state.feedback[art._id];

  let html = `<div class="content-area" style="padding-top:32px">
    <div class="breadcrumb">
      <button onclick="navigate('home')">${ICONS.home} الرئيسية</button><span>/</span>
      <button onclick="navigate('category','${state.selectedCat}')">${getCatLabel(state.selectedCat)}</button><span>/</span>
      <span style="color:var(--text-primary)">${art.title}</span>
    </div>
    <div class="article-detail fade-up">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <span class="article-type-badge type-${art.type}">${getTypeLabel(art.type)}</span>
      </div>
      <h2>${art.title}</h2>`;

  if (embedUrl) {
    html += `<div style="margin:0 0 28px;border-radius:var(--radius-sm);overflow:hidden;aspect-ratio:16/9">
      <iframe src="${embedUrl}" style="width:100%;height:100%;border:none" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen></iframe>
    </div>`;
  }

  html += `<div class="step-list">`;
  steps.forEach((s, i) => {
    html += `<div class="step-item"><div class="step-num">${i+1}</div><div class="step-text">${s}</div></div>`;
  });
  html += `</div>`;

  if (art.downloadUrl) {
    html += `<div class="article-actions"><a href="${art.downloadUrl}" target="_blank" class="btn btn-primary" style="text-decoration:none">${ICONS.download} ${art.downloadLabel || "تحميل"}</a></div>`;
  }

  // Feedback
  html += `<div class="feedback-box">
    <p>هل كان هذا الشرح مفيداً؟</p>
    <div class="feedback-btns">
      <button class="fb-btn ${fb==='yes'?'voted-yes':''}" onclick="voteFeedback('${art._id}','yes')">${ICONS.thumbUp} نعم</button>
      <button class="fb-btn ${fb==='no'?'voted-no':''}" onclick="voteFeedback('${art._id}','no')">${ICONS.thumbDown} لا</button>
    </div>`;
  if (fb === 'yes') html += `<p style="color:var(--success);margin-top:8px;font-size:0.88rem">شكراً لتقييمك!</p>`;
  if (fb === 'no') html += `<p style="color:var(--text-muted);margin-top:8px;font-size:0.88rem">نأسف لذلك، تواصل معنا عبر الواتساب</p>`;
  html += `</div></div></div>`;

  el.innerHTML = html;
}

async function voteFeedback(artId, vote) {
  state.feedback[artId] = vote;
  await fbSet(`feedback/${artId}`, vote);
  renderArticle();
}

  Object.entries(state.servers).forEach(([id, s]) => {

      <div class="status-info"><div class="status-dot status-${s.status}"></div><div><div class="status-label">${s.name}</div><div class="status-time">آخر فحص: ${new Date(s.lastCheck).toLocaleString("ar-SA")}</div></div></div>

  html += `</div></div>`;
  el.innerHTML = html;

// ─── Admin Panel ───
function handleAdminAccess() {
  if (state.isAdmin) { navigate("admin"); return; }
  document.getElementById("pin-modal").classList.remove("hidden");
  document.getElementById("pin-input").value = "";
  document.getElementById("pin-error").classList.add("hidden");
  setTimeout(() => document.getElementById("pin-input").focus(), 100);
}

function closePinModal(e) {
  if (e.target === e.currentTarget) document.getElementById("pin-modal").classList.add("hidden");
}

function verifyPin() {
  const val = document.getElementById("pin-input").value;
  if (val === ADMIN_PIN) {
    state.isAdmin = true;
    document.getElementById("pin-modal").classList.add("hidden");
    navigate("admin");
  } else {
    const err = document.getElementById("pin-error");
    err.textContent = "رمز الدخول غير صحيح";
    err.classList.remove("hidden");
  }
}

    } else {
      html += `<div style="display:flex;justify-content:flex-end;margin-bottom:16px"><button class="btn btn-primary btn-sm" onclick="startEditArticle(null)">${ICONS.plus} إضافة مقال</button></div>`;
      html += `<div style="overflow-x:auto;background:var(--bg-card);border-radius:var(--radius);border:1px solid var(--border)"><table class="admin-table"><thead><tr><th>العنوان</th><th>القسم</th><th>النوع</th><th>الحالة</th><th>إجراءات</th></tr></thead><tbody>`;
      allArts.forEach(([id, art]) => {
        const pubBg = art.published ? "rgba(34,197,94,0.12)" : "rgba(139,149,176,0.12)";
        const pubColor = art.published ? "var(--success)" : "var(--text-muted)";
        const pubText = art.published ? "منشور" : "مسودة";
        html += `<tr>
          <td style="font-weight:600;max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${art.title}</td>
          <td style="color:var(--text-secondary)">${getCatLabel(art.category)}</td>
          <td><span class="article-type-badge type-${art.type}">${getTypeLabel(art.type)}</span></td>
          <td><span style="padding:3px 10px;border-radius:20px;font-size:0.75rem;font-weight:700;background:${pubBg};color:${pubColor}">${pubText}</span></td>
          <td><div class="actions">
            <button class="btn btn-ghost btn-icon btn-sm" onclick="startEditArticle('${id}')">${ICONS.edit}</button>
            <button class="btn btn-danger btn-icon btn-sm" onclick="deleteArticle('${id}')">${ICONS.trash}</button>
          </div></td>
        </tr>`;
      });
      html += `</tbody></table></div>`;
    }
  } else if (state.adminTab === "servers") {
    if (state.editingServer !== null) {
      html += renderServerForm();
    } else {
      html += `<div style="display:flex;justify-content:flex-end;margin-bottom:16px"><button class="btn btn-primary btn-sm" onclick="startEditServer(null)">${ICONS.plus} إضافة سيرفر</button></div>`;
      html += `<div class="status-grid">`;
      Object.entries(state.servers).forEach(([id, s]) => {
        html += `<div class="status-card">
          <div class="status-info"><div class="status-dot status-${s.status}"></div><div><div class="status-label">${s.name}</div><div class="status-time">${new Date(s.lastCheck).toLocaleString("ar-SA")}</div></div></div>
          <div class="actions">
            <button class="btn btn-ghost btn-icon btn-sm" onclick="startEditServer('${id}')">${ICONS.edit}</button>
            <button class="btn btn-danger btn-icon btn-sm" onclick="deleteServer('${id}')">${ICONS.trash}</button>
          </div>
        </div>`;
      });
      html += `</div>`;
    }
  } else if (state.adminTab === "feedback") {
    html += `<div style="background:var(--bg-card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden"><table class="admin-table"><thead><tr><th>المقال</th><th>التقييم</th></tr></thead><tbody>`;
    const fbEntries = Object.entries(state.feedback);
    if (fbEntries.length === 0) {
      html += `<tr><td colspan="2" style="text-align:center;color:var(--text-muted);padding:32px">لا توجد تقييمات بعد</td></tr>`;
    } else {
      fbEntries.forEach(([artId, vote]) => {
        const art = state.articles[artId];
        const vBg = vote === "yes" ? "rgba(34,197,94,0.12)" : "rgba(239,68,68,0.12)";
        const vColor = vote === "yes" ? "var(--success)" : "var(--danger)";
        const vText = vote === "yes" ? "مفيد ✓" : "غير مفيد ✗";
        html += `<tr><td style="font-weight:600">${art?.title||artId}</td><td><span style="padding:3px 12px;border-radius:20px;font-size:0.78rem;font-weight:700;background:${vBg};color:${vColor}">${vText}</span></td></tr>`;
      });
    }
    html += `</tbody></table></div>`;
  }

  html += `</div>`;
  el.innerHTML = html;
}

function switchAdminTab(tab) {
  state.adminTab = tab;
  state.editingArticle = null;
  state.editingServer = null;
  renderAdmin();
}

// ─── Article CRUD ───
function startEditArticle(id) {
  if (id) {
    state.editingArticle = { ...state.articles[id], _id: id };
  } else {
    state.editingArticle = { title:"", category:"android", type:"activation", steps:"", videoUrl:"", downloadUrl:"", downloadLabel:"", published:true, order:1 };
  }
  renderAdmin();
}

function renderArticleForm() {
  const a = state.editingArticle;
  const isEdit = a._id ? true : false;
  let catOptions = CATEGORIES.map(c => `<option value="${c.id}" ${a.category===c.id?'selected':''}>${c.label}</option>`).join('');
  let typeOptions = ARTICLE_TYPES.map(t => `<option value="${t.id}" ${a.type===t.id?'selected':''}>${t.label}</option>`).join('');

  return `<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:28px">
    <h3 style="margin-bottom:20px;font-weight:700">${isEdit?'تعديل المقال':'إضافة مقال جديد'}</h3>
    <div class="form-group"><label>عنوان المقال</label><input id="af-title" value="${a.title}" placeholder="مثل: تفعيل IPTV على أندرويد"></div>
    <div class="form-row">
      <div class="form-group"><label>القسم</label><select id="af-cat">${catOptions}</select></div>
      <div class="form-group"><label>نوع الشرح</label><select id="af-type">${typeOptions}</select></div>
    </div>
    <div class="form-group"><label>الخطوات (سطر لكل خطوة)</label><textarea id="af-steps" placeholder="1. افتح التطبيق\n2. اضغط على الإعدادات">${a.steps||''}</textarea></div>
    <div class="form-row">
      <div class="form-group"><label>رابط الفيديو (اختياري)</label><input id="af-video" value="${a.videoUrl||''}" placeholder="https://youtube.com/..."></div>
      <div class="form-group"><label>ترتيب العرض</label><input id="af-order" type="number" value="${a.order||1}"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>رابط التحميل (اختياري)</label><input id="af-dl" value="${a.downloadUrl||''}" placeholder="https://..."></div>
      <div class="form-group"><label>نص زر التحميل</label><input id="af-dll" value="${a.downloadLabel||''}" placeholder="تحميل التطبيق"></div>
    </div>
    <div class="toggle-row"><span style="font-weight:600">منشور (ظاهر للعملاء)</span><button id="af-pub" class="toggle ${a.published?'on':'off'}" onclick="toggleArticlePub()"></button></div>
    <div style="display:flex;gap:12px;margin-top:20px">
      <button class="btn btn-primary" onclick="saveArticle()">حفظ</button>
      <button class="btn btn-ghost" onclick="state.editingArticle=null;renderAdmin()">إلغاء</button>
    </div>
  </div>`;
}

function toggleArticlePub() {
  state.editingArticle.published = !state.editingArticle.published;
  renderAdmin();
}

async function saveArticle() {
  const a = state.editingArticle;
  const data = {
    title: document.getElementById("af-title").value,
    category: document.getElementById("af-cat").value,
    type: document.getElementById("af-type").value,
    steps: document.getElementById("af-steps").value,
    videoUrl: document.getElementById("af-video").value,
    downloadUrl: document.getElementById("af-dl").value,
    downloadLabel: document.getElementById("af-dll").value,
    order: parseInt(document.getElementById("af-order").value) || 1,
    published: a.published,
    createdAt: a.createdAt || Date.now(),
  };
  if (!data.title.trim()) return;

  if (a._id) {
    await fbSet(`articles/${a._id}`, data);
    state.articles[a._id] = data;
  } else {
    const res = await fbPush("articles", data);
    state.articles[res.name] = data;
  }
  state.editingArticle = null;
  renderAdmin();
}

async function deleteArticle(id) {
  if (!confirm("هل تريد حذف هذا المقال؟")) return;
  await fbDelete(`articles/${id}`);
  delete state.articles[id];
  renderAdmin();
}

// ─── Server CRUD ───
function startEditServer(id) {
  if (id) {
    state.editingServer = { ...state.servers[id], _id: id };
  } else {
    state.editingServer = { name:"", status:"online", lastCheck:Date.now() };
  }
  renderAdmin();
}

function renderServerForm() {
  const s = state.editingServer;
  const isEdit = s._id ? true : false;
  return `<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:28px">
    <h3 style="margin-bottom:20px;font-weight:700">${isEdit?'تعديل السيرفر':'إضافة سيرفر'}</h3>
    <div class="form-group"><label>اسم السيرفر</label><input id="sf-name" value="${s.name}"></div>
    <div class="form-group"><label>الحالة</label><select id="sf-status">
      <option value="online" ${s.status==='online'?'selected':''}>يعمل</option>
      <option value="offline" ${s.status==='offline'?'selected':''}>متوقف</option>
      <option value="maintenance" ${s.status==='maintenance'?'selected':''}>صيانة</option>
    </select></div>
    <div style="display:flex;gap:12px;margin-top:20px">
      <button class="btn btn-primary" onclick="saveServer()">حفظ</button>
      <button class="btn btn-ghost" onclick="state.editingServer=null;renderAdmin()">إلغاء</button>
    </div>
  </div>`;
}

async function saveServer() {
  const s = state.editingServer;
  const data = {
    name: document.getElementById("sf-name").value,
    status: document.getElementById("sf-status").value,
    lastCheck: Date.now(),
  };
  if (!data.name.trim()) return;

  if (s._id) {
    await fbSet(`servers/${s._id}`, data);
    state.servers[s._id] = data;
  } else {
    const res = await fbPush("servers", data);
    state.servers[res.name] = data;
  }
  state.editingServer = null;
  renderAdmin();
}

async function deleteServer(id) {
  if (!confirm("هل تريد حذف هذا السيرفر؟")) return;
  await fbDelete(`servers/${id}`);
  delete state.servers[id];
  renderAdmin();
}

// ─── Init ───
async function init() {
  const arts = await fbGet("articles");
  if (arts && Object.keys(arts).length > 0) {
    state.articles = arts;
  } else {
    await fbSet("articles", DEMO_ARTICLES);
    state.articles = DEMO_ARTICLES;
  }

  const srvs = await fbGet("servers");
  if (srvs && Object.keys(srvs).length > 0) {
    state.servers = srvs;
  } else {
    await fbSet("servers", DEMO_SERVERS);
    state.servers = DEMO_SERVERS;
  }

  const fb = await fbGet("feedback");
  if (fb) state.feedback = fb;

  render();
}

init();
</script>
</body>
</html>
