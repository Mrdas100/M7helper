<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مركز المساعدة</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23F5C200'/><text x='50' y='68' font-size='48' font-weight='900' text-anchor='middle' fill='%23000'>M7</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0e1a;--bg2:#111827;--card:#1a2035;--card-h:#1f2847;--accent:#F5C200;--glow:rgba(245,194,0,0.25);--txt:#f0f0f0;--txt2:#8b95b0;--txt3:#5a6380;--brd:rgba(255,255,255,0.06);--brda:rgba(245,194,0,0.2);--danger:#ef4444;--ok:#22c55e;--r:16px;--rs:10px}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--txt);direction:rtl;min-height:100vh;overflow-x:hidden}
.wrap{min-height:100vh;background:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(245,194,0,0.06),transparent),var(--bg)}
.orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;opacity:.35;animation:of 20s ease-in-out infinite}.o1{width:300px;height:300px;background:rgba(245,194,0,.12);top:-80px;right:-60px}.o2{width:250px;height:250px;background:rgba(0,180,216,.1);bottom:10%;left:-80px;animation-delay:-7s}@keyframes of{0%,100%{transform:translate(0,0)}33%{transform:translate(30px,-20px)}66%{transform:translate(-20px,30px)}}
header{position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);background:rgba(10,14,26,.8);border-bottom:1px solid var(--brd);padding:0 20px;height:58px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:1.15rem;cursor:pointer}.logo-i{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),#e6a800);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:.95rem;color:#000;font-weight:900;box-shadow:0 3px 14px var(--glow)}.logo span{color:var(--accent)}
.ha{display:flex;align-items:center;gap:5px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 15px;border-radius:var(--rs);border:none;cursor:pointer;font-family:inherit;font-weight:600;font-size:.83rem;transition:all .2s;text-decoration:none}
.bp{background:linear-gradient(135deg,var(--accent),#e6a800);color:#000;box-shadow:0 3px 14px var(--glow)}.bp:hover{transform:translateY(-1px)}
.bg{background:transparent;color:var(--txt2);border:1px solid var(--brd)}.bg:hover{background:rgba(255,255,255,.05);color:var(--txt)}
.bd{background:rgba(239,68,68,.12);color:var(--danger);border:1px solid rgba(239,68,68,.2)}
.bs{padding:5px 11px;font-size:.78rem;border-radius:7px}.bi{padding:5px;border-radius:7px}
.hero{text-align:center;padding:48px 20px 32px;position:relative;z-index:1}.hero h1{font-size:clamp(1.5rem,5vw,2.4rem);font-weight:900;line-height:1.3;margin-bottom:8px;background:linear-gradient(135deg,var(--txt),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}.hero p{color:var(--txt2);font-size:.95rem;max-width:460px;margin:0 auto 24px}
.sb{max-width:500px;margin:0 auto;position:relative}.sb input{width:100%;padding:13px 18px 13px 42px;border-radius:50px;border:1px solid var(--brda);background:var(--card);color:var(--txt);font-family:inherit;font-size:.92rem;outline:none;transition:all .3s}.sb input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow)}.sb input::placeholder{color:var(--txt3)}.sic{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--txt3)}
.cg{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px;max-width:920px;margin:0 auto;padding:0 20px 32px;position:relative;z-index:1}
.cc{background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:22px 18px;cursor:pointer;transition:all .3s;display:flex;flex-direction:column;gap:8px;overflow:hidden}.cc:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,.4)}
.cnt{max-width:920px;margin:0 auto;padding:0 20px 48px;position:relative;z-index:1}
.bc{display:flex;align-items:center;gap:7px;color:var(--txt2);font-size:.83rem;margin-bottom:18px;flex-wrap:wrap}.bc button{background:none;border:none;color:var(--accent);cursor:pointer;font-family:inherit;font-size:inherit;font-weight:600}
.al{display:flex;flex-direction:column;gap:9px}.ac{background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:16px 20px;cursor:pointer;transition:all .25s;display:flex;align-items:center;gap:12px}.ac:hover{background:var(--card-h);transform:translateX(-3px)}.ac h4{font-size:.92rem;font-weight:600;flex:1}
.tb{padding:3px 9px;border-radius:20px;font-size:.68rem;font-weight:700;white-space:nowrap;flex-shrink:0}
.ad{background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:26px}.ad h2{font-size:1.3rem;font-weight:800;margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid var(--brd)}
.sl{display:flex;flex-direction:column;gap:12px}.si2{display:flex;gap:12px;align-items:flex-start}.sn{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#e6a800);color:#000;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.82rem;flex-shrink:0}.st{padding-top:4px;font-size:.92rem;line-height:1.6}
.fg{margin-bottom:16px}.fg label{display:block;margin-bottom:5px;font-weight:600;font-size:.85rem;color:var(--txt2)}.fg input,.fg textarea,.fg select{width:100%;padding:9px 13px;border-radius:var(--rs);border:1px solid var(--brd);background:var(--bg2);color:var(--txt);font-family:inherit;font-size:.9rem;outline:none}.fg input:focus,.fg textarea:focus{border-color:var(--accent)}.fg textarea{min-height:130px;resize:vertical;line-height:1.5}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.tg{width:44px;height:22px;border-radius:11px;border:none;cursor:pointer;position:relative;transition:background .2s}.tg.on{background:var(--ok)}.tg.off{background:var(--txt3)}.tg::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:white;top:3px;transition:all .2s}.tg.on::after{left:3px}.tg.off::after{right:3px}
.at{display:flex;gap:3px;margin-bottom:18px;background:var(--bg2);border-radius:var(--rs);padding:3px;overflow-x:auto}.atb{padding:8px 14px;border-radius:6px;border:none;background:transparent;color:var(--txt2);cursor:pointer;font-family:inherit;font-weight:600;font-size:.82rem;white-space:nowrap;transition:all .2s}.atb.on{background:var(--card);color:var(--txt)}
.atbl{width:100%;border-collapse:separate;border-spacing:0}.atbl th{padding:9px 12px;text-align:right;font-weight:600;font-size:.76rem;color:var(--txt3);border-bottom:1px solid var(--brd)}.atbl td{padding:10px 12px;border-bottom:1px solid var(--brd);font-size:.88rem}.atbl tr:hover td{background:rgba(255,255,255,.02)}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:18px}.sc{background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:16px;text-align:center}.sv{font-size:1.6rem;font-weight:900;background:linear-gradient(135deg,var(--accent),#00B4D8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.sl2{color:var(--txt2);font-size:.8rem;margin-top:2px}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}.ml{background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:32px;max-width:380px;width:100%;text-align:center}.ml h3{font-size:1.15rem;margin-bottom:5px}.ml p{color:var(--txt2);margin-bottom:18px;font-size:.88rem}
.pi{letter-spacing:12px;text-align:center;font-size:1.5rem;font-weight:700;padding:11px!important}
.wf{position:fixed;bottom:18px;left:18px;width:50px;height:50px;border-radius:50%;background:#25D366;color:white;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 14px rgba(37,211,102,.4);z-index:100;text-decoration:none}.wf:hover{transform:scale(1.1)}
.ft{text-align:center;padding:24px 20px;color:var(--txt3);font-size:.78rem;border-top:1px solid var(--brd);position:relative;z-index:1}
.hid{display:none!important}
.anr{display:flex;align-items:center;gap:8px;margin-bottom:7px}.anl{min-width:90px;font-size:.8rem;color:var(--txt2);text-align:left;direction:ltr}.anb{height:22px;border-radius:5px;transition:width .6s}.anv{font-size:.8rem;font-weight:700;min-width:28px}
@keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}.fu{animation:fu .4s ease-out forwards}
@media(max-width:640px){.cg{grid-template-columns:1fr}.fr{grid-template-columns:1fr}header{padding:0 12px}.hero{padding:32px 12px 22px}.cnt{padding:0 12px 36px}.ad{padding:18px 14px}}
</style>
</head>
<body>
<div class="wrap">
<div class="orb o1"></div><div class="orb o2"></div>
<header><div class="logo" onclick="nav('home')"><div class="logo-i" id="loi">M7</div><span id="lon">مركز المساعدة</span></div><div class="ha"><button class="btn bg bs" onclick="nav('hosts')">🔗 الهوستات</button><button class="btn bg bs bi" onclick="openAdmin()">⚙️</button></div></header>
<div id="v-home"></div><div id="v-cat" class="hid"></div><div id="v-art" class="hid"></div><div id="v-hosts" class="hid"></div><div id="v-admin" class="hid"></div>
<footer class="ft"><p id="ftt">© 2026 M7TV — مركز المساعدة</p></footer>
<a id="wfab" href="#" target="_blank" class="wf"><svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg></a>
<div id="app-m" class="mo hid" onclick="if(event.target===this)this.classList.add('hid')"><div class="ml" style="max-width:540px;text-align:right;padding:26px" onclick="event.stopPropagation()"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><h3 id="amt"></h3><button onclick="document.getElementById('app-m').classList.add('hid')" style="background:none;border:none;color:var(--txt3);cursor:pointer;font-size:1.2rem">✕</button></div><div id="amb"></div></div></div>
<div id="pin-m" class="mo hid" onclick="if(event.target===this)this.classList.add('hid')"><div class="ml" onclick="event.stopPropagation()"><h3>🔒 لوحة التحكم</h3><p>أدخل رمز الدخول</p><div class="fg"><input id="pini" class="pi" type="password" maxlength="6" placeholder="••••" onkeydown="if(event.key==='Enter')chkPin()"></div><div id="pine" class="hid" style="color:var(--danger);font-size:.82rem;margin-top:5px"></div><button class="btn bp" style="width:100%;margin-top:12px" onclick="chkPin()">دخول</button></div></div>
</div>
<script>
const DB="https://m7tv-helpcenter-default-rtdb.europe-west1.firebasedatabase.app";
const fb={get:async p=>{try{return(await fetch(`${DB}/${p}.json`)).json()}catch{return null}},set:async(p,d)=>fetch(`${DB}/${p}.json`,{method:"PUT",body:JSON.stringify(d)}),push:async(p,d)=>(await fetch(`${DB}/${p}.json`,{method:"POST",body:JSON.stringify(d)})).json(),del:async p=>fetch(`${DB}/${p}.json`,{method:"DELETE"})};
const SP="9999";
const CATS=[{id:"android",l:"أجهزة Android",ic:"🤖",c:"#3DDC84",d:"شاشات، هواتف، TV Box"},{id:"apple",l:"أجهزة Apple",ic:"🍎",c:"#A2AAAD",d:"iPhone, iPad, Apple TV"},{id:"smarttv",l:"الشاشات الذكية",ic:"📺",c:"#00B4D8",d:"Samsung, LG, وأكثر"},{id:"pc",l:"الكمبيوتر",ic:"💻",c:"#FF6B35",d:"Windows, Mac, متصفح"}];
const TPS=[{id:"activation",l:"شرح التفعيل"},{id:"renewal",l:"طريقة التجديد"},{id:"troubleshoot",l:"حلول المشاكل"},{id:"download",l:"تحميل تطبيق"},{id:"general",l:"عام"}];
let S={view:"home",cat:null,art:null,search:"",role:null,dSlug:null,dId:null,articles:{},apps:{},hosts:{},feedback:{},dists:{},settings:{whatsapp:"966500000000",storeName:"M7TV",storeUrl:"",waMsg:"مرحباً، أحتاج مساعدة"},analytics:[],aTab:"articles",editing:null,eType:null};
function dSlug(){return new URLSearchParams(location.search).get('d')||null}
function dp(s){return S.dSlug?`dist/${S.dSlug}/${s}`:s}
// Analytics
async function track(){const ua=navigator.userAgent;let dv="Desktop";if(/Android/i.test(ua))dv="Android";else if(/iPhone|iPad/i.test(ua))dv="iOS";let br="Other";if(/Chrome/i.test(ua)&&!/Edge/i.test(ua))br="Chrome";else if(/Safari/i.test(ua)&&!/Chrome/i.test(ua))br="Safari";else if(/Firefox/i.test(ua))br="Firefox";else if(/Edge/i.test(ua))br="Edge";const v={ts:Date.now(),dv,br,scr:`${screen.width}x${screen.height}`};try{const r=await fetch("https://ipapi.co/json/",{signal:AbortSignal.timeout(3e3)});const d=await r.json();v.co=d.country_name||"?";v.ci=d.city||"";v.ip=d.ip||"";v.cc=d.country_code||""}catch{v.co="?"}await fb.push(dp("visits"),v)}
// Helpers
function cl(id){return CATS.find(c=>c.id===id)?.l||""}
function co(id){return CATS.find(c=>c.id===id)}
function tl(id){return TPS.find(t=>t.id===id)?.l||""}
function pub(){return Object.entries(S.articles).filter(([,a])=>a.published)}
function cc(cid){return pub().filter(([,a])=>a.category===cid).length}
function ps(t){return t?t.split("\n").filter(l=>l.trim()).map(l=>l.replace(/^\d+[\.\-\)]\s*/,"").trim()):[]}
function rs(arr){return arr.map((s,i)=>{const hl=s.includes('📌')||s.includes('⚠️'),ok=s.includes('🎉')||s.includes('✅'),tip=s.includes('💡');let bg='',bd='';if(hl){bg='background:rgba(245,194,0,.06);padding:9px 12px;border-radius:9px;';bd='border-right:3px solid var(--accent);'}if(ok){bg='background:rgba(34,197,94,.07);padding:9px 12px;border-radius:9px;';bd='border-right:3px solid var(--ok);'}if(tip){bg='background:rgba(0,180,216,.06);padding:9px 12px;border-radius:9px;';bd='border-right:3px solid #00B4D8;'}return`<div class="si2" style="${bg}${bd}"><div class="sn" style="${ok?'background:linear-gradient(135deg,var(--ok),#16a34a)':''}">${ok?'✓':(i+1)}</div><div class="st">${s}</div></div>`}).join('')}
function cpTxt(t,bid){navigator.clipboard.writeText(t).catch(()=>{const a=document.createElement('textarea');a.value=t;document.body.appendChild(a);a.select();document.execCommand('copy');document.body.removeChild(a)});const b=document.getElementById(bid);if(b){const o=b.innerHTML;b.innerHTML='✅ تم!';setTimeout(()=>b.innerHTML=o,2e3)}}
// Nav
function nav(v,c,a){S.view=v;S.cat=c||null;S.art=a||null;S.search="";S.editing=null;S.eType=null;ren();scrollTo({top:0,behavior:"smooth"})}
function ren(){["home","cat","art","hosts","admin"].forEach(v=>{const e=document.getElementById(`v-${v}`);if(e)e.classList.toggle("hid",S.view!==v)});if(S.view==="home")rH();else if(S.view==="cat")rC();else if(S.view==="art")rA();else if(S.view==="hosts")rHo();else if(S.view==="admin")rAd()}
function gf(){return pub().filter(([,a])=>{const mc=S.cat?a.category===S.cat:true;const ms=S.search?(a.title.includes(S.search)||a.steps?.includes(S.search)):true;return mc&&ms}).sort(([,a],[,b])=>(a.order||0)-(b.order||0))}
function oA(id){const a=S.articles[id];if(a)nav("art",a.category,{...a,_id:id})}
function rf(){const i=document.getElementById("sinp");if(i){i.focus();i.selectionStart=i.selectionEnd=i.value.length}}
// ─── Render Views ───
function rH(){const el=document.getElementById("v-home");const f=gf();const ss=S.search.length>0;
let h=`<section class="hero fu"><h1>${S.settings.storeName||'M7TV'} — مركز المساعدة</h1><p>كل ما تحتاجه لتفعيل وإعداد اشتراكك</p><div class="sb"><span class="sic">🔍</span><input id="sinp" placeholder="ابحث عن جهازك أو مشكلتك..." value="${S.search}" oninput="S.search=this.value;rH();rf()" onkeydown="if(event.key==='Enter'&&this.value)nav('cat')"></div></section>`;
if(ss){h+=`<div class="cnt"><h2 style="margin-bottom:14px">نتائج البحث (${f.length})</h2><div class="al">`;if(!f.length)h+=`<div style="text-align:center;padding:36px;color:var(--txt3)">لم نجد نتائج</div>`;f.forEach(([id,a])=>{h+=`<div class="ac" onclick='oA("${id}")'><span class="tb" style="background:rgba(245,194,0,.1);color:var(--accent)">${tl(a.type)}</span><h4>${a.title}</h4></div>`});h+=`</div></div>`}
else{h+=`<section class="cg">`;CATS.forEach((c,i)=>{h+=`<div class="cc fu" style="animation-delay:${i*.08}s" onclick="nav('cat','${c.id}')"><div style="width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center;background:${c.c}18;font-size:1.4rem">${c.ic}</div><h3>${c.l}</h3><p style="color:var(--txt2);font-size:.82rem">${c.d}</p><div style="padding:2px 9px;border-radius:20px;font-size:.7rem;font-weight:700;background:${c.c}12;color:${c.c};width:fit-content">${cc(c.id)} شرح</div></div>`});h+=`</section>`;
const ah=Object.entries(S.hosts).filter(([,x])=>x.active).sort(([,a],[,b])=>(a.order||0)-(b.order||0));
if(ah.length){h+=`<div class="cnt" style="margin-top:12px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h2 style="font-size:1.1rem">🔗 روابط السيرفرات</h2><button class="btn bg bs" onclick="nav('hosts')">عرض الكل</button></div><div style="display:flex;flex-direction:column;gap:7px">`;
ah.forEach(([id,x])=>{h+=`<div style="display:flex;align-items:center;justify-content:space-between;gap:8px;padding:11px 16px;background:var(--card);border:1px solid var(--brd);border-radius:9px;flex-wrap:wrap"><div style="display:flex;align-items:center;gap:9px;flex:1"><div style="width:6px;height:6px;border-radius:50%;background:var(--ok)"></div><div><strong style="font-size:.88rem">${x.name}</strong><br><code style="font-size:.76rem;color:var(--accent);direction:ltr">${x.url}</code></div></div><button id="cp${id}" onclick="cpTxt('${x.url.replace(/'/g,"\\'")}','cp${id}')" class="btn bg bs">📋 نسخ</button></div>`});h+=`</div></div>`}}
el.innerHTML=h}

function rC(){const el=document.getElementById("v-cat");const f=gf();let h=`<div class="cnt" style="padding-top:24px"><div class="bc"><button onclick="nav('home')">🏠 الرئيسية</button><span>/</span><span>${cl(S.cat)}</span></div><h2 style="margin-bottom:14px">${cl(S.cat)}</h2><div class="al">`;if(!f.length)h+=`<div style="text-align:center;padding:36px;color:var(--txt3)">لا توجد شروحات بعد</div>`;f.forEach(([id,a])=>{h+=`<div class="ac fu" onclick='oA("${id}")'><span class="tb" style="background:rgba(245,194,0,.1);color:var(--accent)">${tl(a.type)}</span><h4>${a.title}</h4></div>`});h+=`</div></div>`;el.innerHTML=h}

function rA(){const el=document.getElementById("v-art");const a=S.art;if(!a)return;const st=ps(a.steps);const c=co(S.cat);

function sE(type,id){S.eType=type;if(type==='art')S.editing=id?{...S.articles[id],_id:id}:{title:"",category:"android",type:"activation",steps:"",videoUrl:"",downloadUrl:"",downloadLabel:"",published:true,order:1,appIds:[]};else if(type==='app')S.editing=id?{...S.apps[id],_id:id}:{name:"",emoji:"📱",color:"#F5C200",steps:"",downloadUrl:"",downloadLabel:"",active:true,order:1};else if(type==='host')S.editing=id?{...S.hosts[id],_id:id}:{name:"",url:"",port:"8080",note:"",active:true,order:1};else if(type==='dist')S.editing=id?{...S.dists[id],_id:id}:{name:"",slug:"",pin:"",accent:"#F5C200",whatsapp:"",active:true};rAd()}
function rF(type){const e=S.editing;const ie=!!e._id;
if(type==='art'){let co2=CATS.map(c=>`<option value="${c.id}" ${e.category===c.id?'selected':''}>${c.l}</option>`).join('');let to=TPS.map(t=>`<option value="${t.id}" ${e.type===t.id?'selected':''}>${t.l}</option>`).join('');let ac=Object.entries(S.apps).map(([id,a])=>{const ch=(e.appIds||[]).includes(id);return`<label style="display:flex;align-items:center;gap:4px;padding:5px 12px;background:${ch?a.color+'14':'var(--bg2)'};border:1px solid ${ch?a.color+'30':'var(--brd)'};border-radius:7px;cursor:pointer;font-size:.83rem"><input type="checkbox" ${ch?'checked':''} onchange="ta('${id}')" style="accent-color:${a.color}"> ${a.emoji||''} ${a.name}</label>`}).join('');
return`<div style="background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:22px"><h3 style="margin-bottom:16px;font-weight:700">${ie?'تعديل المقال':'إضافة مقال'}</h3><div class="fg"><label>العنوان</label><input id="ft" value="${e.title||''}"></div><div class="fr"><div class="fg"><label>القسم</label><select id="fc">${co2}</select></div><div class="fg"><label>النوع</label><select id="fy">${to}</select></div></div><div class="fg"><label>الخطوات</label><textarea id="fs">${e.steps||''}</textarea></div><div class="fr"><div class="fg"><label>فيديو</label><input id="fv" value="${e.videoUrl||''}"></div><div class="fg"><label>ترتيب</label><input id="fo" type="number" value="${e.order||1}"></div></div><div class="fr"><div class="fg"><label>رابط تحميل</label><input id="fd" value="${e.downloadUrl||''}"></div><div class="fg"><label>نص الزر</label><input id="fl" value="${e.downloadLabel||''}"></div></div><div class="fg"><label>التطبيقات المرتبطة</label><div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:5px">${ac||'<span style="color:var(--txt3);font-size:.83rem">أضف تطبيقات أولاً</span>'}</div></div><div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0"><span style="font-weight:600">منشور</span><button class="tg ${e.published?'on':'off'}" onclick="S.editing.published=!S.editing.published;rAd()"></button></div><div style="display:flex;gap:8px;margin-top:14px"><button class="btn bp" onclick="svI('art')">حفظ</button><button class="btn bg" onclick="S.editing=null;S.eType=null;rAd()">إلغاء</button></div></div>`}
if(type==='app'){return`<div style="background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:22px"><h3 style="margin-bottom:16px;font-weight:700">${ie?'تعديل التطبيق':'إضافة تطبيق'}</h3><div class="fr"><div class="fg"><label>الاسم</label><input id="fn" value="${e.name||''}"></div><div class="fg"><label>إيموجي</label><input id="fe" value="${e.emoji||''}" style="font-size:1.3rem;text-align:center"></div></div><div class="fr"><div class="fg"><label>اللون</label><input id="fco" type="color" value="${e.color||'#F5C200'}" style="height:40px;cursor:pointer"></div><div class="fg"><label>ترتيب</label><input id="fo" type="number" value="${e.order||1}"></div></div><div class="fg"><label>خطوات الشرح</label><textarea id="fs">${e.steps||''}</textarea></div><div class="fr"><div class="fg"><label>رابط تحميل</label><input id="fd" value="${e.downloadUrl||''}"></div><div class="fg"><label>نص الزر</label><input id="fl" value="${e.downloadLabel||''}"></div></div><div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0"><span style="font-weight:600">فعّال</span><button class="tg ${e.active?'on':'off'}" onclick="S.editing.active=!S.editing.active;rAd()"></button></div><div style="display:flex;gap:8px;margin-top:14px"><button class="btn bp" onclick="svI('app')">حفظ</button><button class="btn bg" onclick="S.editing=null;S.eType=null;rAd()">إلغاء</button></div></div>`}
if(type==='host'){return`<div style="background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:22px"><h3 style="margin-bottom:16px;font-weight:700">${ie?'تعديل':'إضافة هوست'}</h3><div class="fg"><label>الاسم</label><input id="fn" value="${e.name||''}"></div><div class="fg"><label>الرابط</label><input id="fu" value="${e.url||''}" style="direction:ltr;text-align:left"></div><div class="fr"><div class="fg"><label>المنفذ</label><input id="fp" value="${e.port||''}" style="direction:ltr"></div><div class="fg"><label>ترتيب</label><input id="fo" type="number" value="${e.order||1}"></div></div><div class="fg"><label>ملاحظة</label><input id="fno" value="${e.note||''}"></div><div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0"><span style="font-weight:600">فعّال</span><button class="tg ${e.active?'on':'off'}" onclick="S.editing.active=!S.editing.active;rAd()"></button></div><div style="display:flex;gap:8px;margin-top:14px"><button class="btn bp" onclick="svI('host')">حفظ</button><button class="btn bg" onclick="S.editing=null;S.eType=null;rAd()">إلغاء</button></div></div>`}
if(type==='dist'){return`<div style="background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:22px"><h3 style="margin-bottom:16px;font-weight:700">${ie?'تعديل الموزع':'إضافة موزع'}</h3><div class="fr"><div class="fg"><label>الاسم</label><input id="fn" value="${e.name||''}"></div><div class="fg"><label>المعرّف (slug) بالإنجليزي</label><input id="fsl" value="${e.slug||''}" placeholder="mrdas" style="direction:ltr;text-align:left" ${ie?'disabled':''}></div></div><div class="fr"><div class="fg"><label>PIN الدخول</label><input id="fpi" value="${e.pin||''}" style="direction:ltr;text-align:left;letter-spacing:3px;font-weight:700"></div><div class="fg"><label>لون</label><input id="fco" type="color" value="${e.accent||'#F5C200'}" style="height:40px;cursor:pointer"></div></div><div class="fg"><label>واتساب الموزع</label><input id="fwa" value="${e.whatsapp||''}" style="direction:ltr;text-align:left"></div><div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0"><span style="font-weight:600">فعّال</span><button class="tg ${e.active?'on':'off'}" onclick="S.editing.active=!S.editing.active;rAd()"></button></div><p style="margin-top:6px;padding:8px 12px;background:var(--bg2);border-radius:7px;font-size:.8rem;color:var(--txt2)">💡 رابط الموزع: <code style="color:var(--accent)">${location.origin}${location.pathname}?d=${e.slug||'slug'}</code></p><div style="display:flex;gap:8px;margin-top:14px"><button class="btn bp" onclick="svDist()">حفظ</button><button class="btn bg" onclick="S.editing=null;S.eType=null;rAd()">إلغاء</button></div></div>`}
return ''}
function ta(id){if(!S.editing.appIds)S.editing.appIds=[];const i=S.editing.appIds.indexOf(id);if(i>-1)S.editing.appIds.splice(i,1);else S.editing.appIds.push(id);rAd()}
async function svI(type){const e=S.editing;let d,col;if(type==='art'){col='articles';d={title:document.getElementById("ft").value,category:document.getElementById("fc").value,type:document.getElementById("fy").value,steps:document.getElementById("fs").value,videoUrl:document.getElementById("fv")?.value||"",downloadUrl:document.getElementById("fd")?.value||"",downloadLabel:document.getElementById("fl")?.value||"",order:parseInt(document.getElementById("fo")?.value)||1,published:e.published,appIds:e.appIds||[],createdAt:e.createdAt||Date.now()}}else if(type==='app'){col='apps';d={name:document.getElementById("fn").value,emoji:document.getElementById("fe").value,color:document.getElementById("fco").value,steps:document.getElementById("fs").value,downloadUrl:document.getElementById("fd")?.value||"",downloadLabel:document.getElementById("fl")?.value||"",order:parseInt(document.getElementById("fo")?.value)||1,active:e.active,createdAt:e.createdAt||Date.now()}}else if(type==='host'){col='hosts';d={name:document.getElementById("fn").value,url:document.getElementById("fu").value,port:document.getElementById("fp")?.value||"",note:document.getElementById("fno")?.value||"",order:parseInt(document.getElementById("fo")?.value)||1,active:e.active,createdAt:e.createdAt||Date.now()}}if(!d)return;const p=dp(col);if(e._id){await fb.set(`${p}/${e._id}`,d);S[col][e._id]=d}else{const r=await fb.push(p,d);S[col][r.name]=d}S.editing=null;S.eType=null;rAd()}
async function dI(col,id){if(!confirm("حذف؟"))return;await fb.del(`${dp(col)}/${id}`);delete S[col][id];rAd()}
async function svDist(){const e=S.editing;const d={name:document.getElementById("fn").value,slug:e._id?e.slug:document.getElementById("fsl").value.trim().toLowerCase().replace(/\s+/g,'-'),pin:document.getElementById("fpi").value,accent:document.getElementById("fco").value,whatsapp:document.getElementById("fwa")?.value||"",active:e.active,createdAt:e.createdAt||Date.now()};if(!d.name||!d.slug||!d.pin)return;if(e._id){await fb.set(`distributors/${e._id}`,d);S.dists[e._id]=d}else{const r=await fb.push("distributors",d);S.dists[r.name]=d;await fb.set(`dist/${d.slug}/settings`,{whatsapp:d.whatsapp,storeName:d.name,storeUrl:"",waMsg:"مرحباً"})}S.editing=null;S.eType=null;rAd()}
async function dDist(id){if(!confirm("حذف الموزع وبياناته؟"))return;const d=S.dists[id];if(d?.slug)await fb.del(`dist/${d.slug}`);await fb.del(`distributors/${id}`);delete S.dists[id];rAd()}
// Theme
function apT(){const s=S.settings;document.getElementById("lon").textContent=(s.storeName||'M7TV')+' — مركز المساعدة';document.getElementById("ftt").textContent=`© 2026 ${s.storeName||'M7TV'}`;const f=document.getElementById("wfab");if(f&&s.whatsapp){let u="https://wa.me/"+s.whatsapp;if(s.waMsg)u+="?text="+encodeURIComponent(s.waMsg);f.href=u}if(S.dSlug){const di=Object.values(S.dists).find(x=>x.slug===S.dSlug);if(di?.accent)document.documentElement.style.setProperty('--accent',di.accent)}}
async function loadData(){let a=await fb.get(dp("articles"));if(a)S.articles=a;else S.articles={};let ap=await fb.get(dp("apps"));if(ap)S.apps=ap;else S.apps={};let h=await fb.get(dp("hosts"));if(h)S.hosts=h;else S.hosts={};let f=await fb.get(dp("feedback"));if(f)S.feedback=f;let st=await fb.get(dp("settings"));if(st)S.settings={...S.settings,...st}}
async function init(){S.dSlug=dSlug();const dd=await fb.get("distributors");if(dd)S.dists=dd;if(S.dSlug){const di=Object.values(dd||{}).find(x=>x.slug===S.dSlug&&x.active);if(!di)S.dSlug=null}await loadData();apT();ren();track()}
init();
